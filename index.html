<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Buji ma 🎀</title>
    <style>
        :root {
            --lavender: #E6E6FA;
            --deep-purple: #4b0082;
            --royal-font: "Didot", "Bodoni MT", "Cochin", "Baskerville", serif;
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--lavender); overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 🤌🏻 Loading Screen */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            color: var(--lavender); font-family: var(--royal-font); font-style: italic;
        }

        .back-btn {
            position: absolute; top: 25px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px);
            color: white; border: 1px solid var(--glass-border);
            padding: 8px 18px; border-radius: 30px; font-family: var(--royal-font);
            font-size: 0.75rem; letter-spacing: 2px; cursor: pointer;
        }

        /* 1️⃣ PAGE 1: FLOATING CAPSULE */
        .page { display: none; width: 100%; height: 100vh; position: relative; }
        #page1 { 
            display: flex; flex-direction: column; 
            justify-content: flex-end; align-items: center; 
            padding-bottom: 100px; background: #000;
        }
        
        #bg-video {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .login-capsule {
            position: relative; z-index: 2; width: 280px;
            padding: 30px 20px; text-align: center;
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 40px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .royal-title {
            color: white; font-family: var(--royal-font); font-size: 1.4rem; 
            margin-bottom: 20px; letter-spacing: 2px; line-height: 1.4;
        }

        input[type="date"] {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.15); 
            border: none; border-bottom: 2px solid var(--lavender);
            color: white; font-family: var(--royal-font); font-size: 1.1rem;
            margin-bottom: 25px; outline: none; text-align: center; border-radius: 10px 10px 0 0;
        }

        .btn-enter {
            background: transparent; color: white; border: 1px solid var(--lavender);
            padding: 12px; font-family: var(--royal-font); text-transform: uppercase;
            letter-spacing: 4px; width: 100%; cursor: pointer; border-radius: 30px;
        }

        /* 2️⃣ PAGE 2: COSMOS SCROLL (ZOOM & TYPE) */
        #page2 { 
            background-color: var(--lavender); 
            overflow-y: scroll; scroll-snap-type: y mandatory;
        }

        .cosmos-section {
            height: 100vh; width: 100%; display: flex; 
            justify-content: center; align-items: center; 
            scroll-snap-align: start; perspective: 1200px;
        }

        .image-card {
            width: 88%; height: 78vh; border-radius: 45px; 
            overflow: hidden; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: scale(0.85); /* Zoomed out by default */
        }

        .cosmos-section.active .image-card {
            transform: scale(1); /* Zoom in when active */
        }

        .image-card img {
            width: 110%; height: 110%; /* Larger for parallax */
            object-fit: cover;
            position: absolute; top: -5%; left: -5%;
            transition: transform 0.5s ease-out;
        }

        .typing-text {
            position: absolute; bottom: 8%; left: 10%; right: 10%;
            color: white; font-family: var(--royal-font);
            font-weight: 600; font-size: 1.7rem;
            text-shadow: 0 3px 15px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        /* 3️⃣ PAGE 3: FINAL LETTER */
        #page3 { background: var(--lavender); flex-direction: column; align-items: center; padding: 90px 25px; overflow-y: auto; }
        .letter-box { background: white; padding: 40px; border-radius: 30px; max-width: 500px; width: 100%; color: var(--deep-purple); box-shadow: 0 10px 40px rgba(0,0,0,0.05); }

    </style>
</head>
<body onload="init()">

    <div id="loading-screen">konjam wait panu d chlm🤌🏻</div>

    <div id="page1" class="page" style="display: flex;" onclick="unmuteVideo()">
        <video id="bg-video" autoplay loop playsinline muted>
            <source src="video.mp4.MP4" type="video/mp4">
        </video>
        <div class="login-capsule">
            <div class="royal-title">For my Buji ma 🎀<br>🤌🏻</div>
            <input type="date" id="birthInput" onfocus="unmuteVideo()">
            <button class="btn-enter" onclick="checkLogin()">Enter</button>
            <div id="error-msg" style="color:#ffb3b3; font-size: 0.7rem; margin-top:10px; display:none;">Birthdate ah correct podu eruma maadu👺</div>
        </div>
    </div>

    <div id="page2" class="page">
        <button class="back-btn" onclick="goBackToLogin()">← RESET</button>

        <div class="cosmos-section" data-text="Every single moment...">
            <div class="image-card">
                <img src="image1.jpg.JPG" class="parallax-img">
                <div class="typing-text"></div>
            </div>
        </div>

        <div class="cosmos-section" data-text="You are my inspiration.">
            <div class="image-card">
                <img src="image2.jpg.HEIC" class="parallax-img">
                <div class="typing-text"></div>
            </div>
        </div>

        <div class="cosmos-section" data-text="My peace and my joy.">
            <div class="image-card">
                <img src="image3.jpg.HEIC" class="parallax-img">
                <div class="typing-text"></div>
            </div>
        </div>

        <div class="cosmos-section" data-text="Ready for the surprise?">
            <div class="image-card">
                <img src="image6.jpg.HEIC" class="parallax-img">
                <div class="typing-text"></div>
                <button class="btn-enter" style="position:absolute; bottom:20px; left:20%; width:60%;" onclick="goToFinal()">Open Heart</button>
            </div>
        </div>
    </div>

    <div id="page3" class="page">
        <button class="back-btn" style="color:var(--deep-purple); border-color:var(--deep-purple);" onclick="goBackToScroll()">← PHOTOS</button>
        <div class="letter-box">
            <h2 style="font-family: var(--royal-font); font-style: italic;">My Dearest Buji,</h2>
            <p style="line-height: 1.8;">[PASTE YOUR LONG LETTER HERE]</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');
        const p3 = document.getElementById('page3');

        function init() { setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 2000); }
        function unmuteVideo() { video.muted = false; }

        function checkLogin() {
            const val = document.getElementById('birthInput').value;
            if (val === "2004-02-23") { // 🚨 UPDATE BIRTHDATE HERE
                video.pause();
                p1.style.display = 'none'; p2.style.display = 'block';
                document.body.style.overflow = 'auto';
            } else { document.getElementById('error-msg').style.display = 'block'; }
        }

        // --- COSMOS INTERACTION LOGIC ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const textEl = entry.target.querySelector('.typing-text');
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    runTypewriter(entry.target.getAttribute('data-text'), textEl);
                } else {
                    entry.target.classList.remove('active');
                    textEl.innerHTML = ""; // Reset text
                }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.cosmos-section').forEach(s => observer.observe(s));

        function runTypewriter(text, element) {
            if (element.innerHTML !== "") return;
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 60);
                }
            }
            type();
        }

        // Parallax Effect on Scroll
        p2.addEventListener('scroll', () => {
            document.querySelectorAll('.parallax-img').forEach(img => {
                let speed = 0.2;
                let rect = img.parentElement.getBoundingClientRect();
                let yPos = -(rect.top * speed);
                img.style.transform = `translateY(${yPos}px)`;
            });
        });

        function goBackToLogin() { p2.style.display = 'none'; p1.style.display = 'flex'; video.play(); }
        function goToFinal() { p2.style.display = 'none'; p3.style.display = 'flex'; window.scrollTo(0,0); }
        function goBackToScroll() { p3.style.display = 'none'; p2.style.display = 'block'; }
    </script>
</body>
</html>
