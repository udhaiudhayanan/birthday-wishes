<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Buji ma 🎀</title>
    <style>
        :root {
            --vibrant-violet: #8A2BE2;
            --loading-purple: #4b0082;
            --royal-font: "Didot", serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* iOS Elastic Scroll Feel */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--vibrant-violet); 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }

        #loading-screen {
            position: fixed; inset: 0; background: var(--loading-purple); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: var(--royal-font); font-style: italic;
        }

        /* 1️⃣ PAGE 1: FLOATING LOGIN */
        .page { display: none; width: 100%; height: 100vh; position: relative; z-index: 10; }
        #page1 { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 12vh; background: #000; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .login-capsule { 
            position: relative; z-index: 2; width: 280px; padding: 30px; text-align: center; 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: floatUI 4s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes floatUI { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        input[type="date"] {
            width: 100%; padding: 12px; background: transparent; border: none; 
            border-bottom: 2px solid white; color: white; text-align: center;
            font-size: 1.1rem; margin-bottom: 20px; outline: none;
        }

        .btn-enter { 
            background: white; color: black; border: none; padding: 14px; 
            width: 100%; border-radius: 30px; font-weight: 700; letter-spacing: 1px;
        }

        /* 2️⃣ PAGE 2: iPHONE MULTITASK STACK */
        #page2 { 
            background-color: var(--vibrant-violet); 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory;
            height: 100vh;
            -webkit-overflow-scrolling: touch; /* Butter smooth iOS physics */
            scroll-behavior: smooth;
        }
        #page2::-webkit-scrollbar { display: none; }

        .stack-container {
            height: 100vh; width: 100%; 
            display: flex; justify-content: center; align-items: center;
            scroll-snap-align: center; 
            position: sticky; top: 0;
            will-change: transform;
        }

        .floating-template {
            width: 88%; height: 78vh; border-radius: 45px; 
            overflow: hidden; position: relative;
            background: #000; box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            transform: translateZ(0); /* Hardware Acceleration */
            animation: cardBreathe 6s ease-in-out infinite;
        }

        @keyframes cardBreathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .floating-template img { width: 100%; height: 100%; object-fit: cover; }

        /* iOS Style Glass Bar */
        .glass-text-bar {
            position: absolute; bottom: 8%; left: 6%; right: 6%;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 22px; border-radius: 30px;
            color: #000; font-weight: 900; 
            font-size: 1.4rem; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Swipe Hint */
        .swipe-hint {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); color: white;
            font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;
            animation: bounce 2s infinite; z-index: 100;
        }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);} 40% {transform: translateY(-10px) translateX(-50%);} }

        /* 3️⃣ PAGE 3: FINAL */
        #page3 { background: var(--vibrant-violet); flex-direction: column; align-items: center; padding: 100px 20px; overflow-y: auto; }
        .letter-box { background: rgba(255,255,255,0.95); padding: 45px; border-radius: 40px; width: 100%; max-width: 500px; color: #000; }

    </style>
</head>
<body onload="init()">

    <div id="loading-screen">🤌🏻 loading...</div>

    <div id="page1" class="page" style="display: flex;" onclick="unmuteVideo()">
        <video id="bg-video" autoplay loop playsinline muted><source src="video.mp4.MP4" type="video/mp4"></video>
        <div class="login-capsule">
            <div style="color:white; margin-bottom:15px; font-weight: 700;">For my Buji ma 🎀</div>
            <input type="date" id="birthInput">
            <button class="btn-enter" onclick="checkLogin()">ENTER</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="swipe-hint">SWIPE UP</div>
        
        <div class="stack-container">
            <div class="floating-template"><img src="image1.jpg.JPG"><div class="glass-text-bar">Every moment...</div></div>
        </div>
        <div class="stack-container">
            <div class="floating-template"><img src="image2.jpg.HEIC"><div class="glass-text-bar">With you...</div></div>
        </div>
        <div class="stack-container">
            <div class="floating-template"><img src="image3.jpg.HEIC"><div class="glass-text-bar">Is magical.</div></div>
        </div>
        <div class="stack-container">
            <div class="floating-template"><img src="image4.jpg.jpg"><div class="glass-text-bar">My peace.</div></div>
        </div>
        <div class="stack-container">
            <div class="floating-template"><img src="image5.jpg.HEIC"><div class="glass-text-bar">Always.</div></div>
        </div>
        <div class="stack-container">
            <div class="floating-template">
                <img src="image6.jpg.HEIC">
                <div class="glass-text-bar">
                    I love you!
                    <button onclick="goToFinal()" style="display:block; margin: 15px auto 0; background:#000; color:#fff; border:none; padding:10px 25px; border-radius:20px; font-weight:700;">OPEN HEART</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="letter-box">
            <h2 style="font-family: var(--royal-font);">My Buji ma,</h2>
            <p style="line-height: 1.8; font-size: 1.1rem;">[PASTE YOUR LETTER HERE]</p>
            <button class="btn-enter" style="background:#000; color:#fff;" onclick="location.reload()">REPLAY</button>
        </div>
    </div>

    <script>
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');
        const video = document.getElementById('bg-video');

        function init() { setTimeout(() => document.getElementById('loading-screen').style.display='none', 1200); }
        function unmuteVideo() { video.muted = false; }

        function checkLogin() {
            if (document.getElementById('birthInput').value === "2004-02-23") { 
                video.pause();
                video.src = "";
                video.remove(); 
                
                p1.style.display = 'none'; 
                p2.style.display = 'block';
            }
        }

        function goToFinal() { p2.style.display = 'none'; document.getElementById('page3').style.display = 'flex'; window.scrollTo(0,0); }
    </script>
</body>
</html>
