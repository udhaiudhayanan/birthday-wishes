<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Buji ma 🎀</title>
    <style>
        :root {
            --lavender: #E6E6FA;
            --deep-purple: #4b0082;
            --royal-font: "Didot", "Bodoni MT", "Cochin", "Baskerville", serif;
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            color: var(--lavender); font-family: var(--royal-font); font-style: italic;
        }

        .back-btn {
            position: absolute; top: 25px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px);
            color: white; border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 30px; font-family: var(--royal-font);
            font-size: 0.7rem; letter-spacing: 2px; cursor: pointer;
        }

        /* PAGE 1: FLOATING CAPSULE LAYOUT */
        .page { display: none; width: 100%; height: 100vh; position: relative; }
        #page1 { 
            display: flex; flex-direction: column; 
            justify-content: flex-end; align-items: center; 
            padding-bottom: 100px; 
        }
        
        #bg-video {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* The Floating Box Refined */
        .login-container {
            position: relative; z-index: 2; 
            width: 280px; /* Smaller, compact width */
            padding: 30px 20px; text-align: center;
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 40px; /* Super soft edges */
            animation: float 3s ease-in-out infinite; /* Soft floating effect */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .royal-title {
            color: white; font-family: var(--royal-font); font-size: 1.4rem; 
            margin-bottom: 20px; letter-spacing: 2px; opacity: 0.9;
            line-height: 1.4;
        }

        input[type="date"] {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.1); 
            border: none; border-bottom: 1px solid var(--lavender);
            color: white; font-family: var(--royal-font); font-size: 1rem;
            margin-bottom: 20px; outline: none; text-align: center;
            border-radius: 15px 15px 0 0;
        }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.8; }

        .btn-enter {
            background: transparent; color: white; border: 1px solid var(--lavender);
            padding: 12px; font-family: var(--royal-font); text-transform: uppercase;
            letter-spacing: 4px; width: 100%; cursor: pointer; transition: 0.4s;
            border-radius: 30px; /* Soft pill-shaped button */
            font-size: 0.9rem;
        }
        .btn-enter:active { background: var(--lavender); color: var(--deep-purple); }

        #error-msg { 
            color: #ffb3b3; font-family: var(--royal-font); font-size: 0.75rem; font-style: italic;
            margin-top: 15px; display: none;
        }

        /* PAGE 2 & 3: (Restored as before) */
        #page2 { background: var(--lavender); overflow-y: scroll; scroll-snap-type: y mandatory; }
        .scroll-section {
            height: 100vh; width: 100%; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background-size: cover; background-position: center;
        }
        .scroll-text {
            font-size: 2.5rem; font-weight: 800; color: white; text-align: center;
            padding: 20px; text-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }
        #page3 { background: var(--lavender); flex-direction: column; align-items: center; padding: 80px 25px; overflow-y: auto; }
        .letter-box { background: white; padding: 40px; border-radius: 20px; max-width: 500px; width: 100%; color: var(--deep-purple); }
    </style>
</head>
<body onload="init()">

    <div id="loading-screen">konjam wait panu d chlm🤌🏻</div>

    <div id="page1" class="page" style="display: flex;" onclick="unmuteVideo()">
        <video id="bg-video" autoplay loop playsinline muted>
            <source src="video.mp4.MP4" type="video/mp4">
        </video>
        <div class="login-container">
            <div class="royal-title">For my Buji ma 🎀<br>🤌🏻</div>
            <input type="date" id="birthInput" onfocus="unmuteVideo()">
            <button class="btn-enter" onclick="checkLogin()">Enter</button>
            <div id="error-msg">Birthdate ah correct podu eruma maadu👺</div>
        </div>
    </div>

    <div id="page2" class="page">
        <button class="back-btn" onclick="goBackToLogin()">← RESET</button>
        <section class="scroll-section" style="background-image: url('image1.jpg.JPG');"><div class="scroll-text">Thinking of you.</div></section>
        <section class="scroll-section" style="background-image: url('image2.jpg.HEIC');"><div class="scroll-text">Every single</div></section>
        <section class="scroll-section" style="background-image: url('image3.jpg.HEIC');"><div class="scroll-text">moment.</div></section>
        <section class="scroll-section" style="background-image: url('image4.jpg.jpg');"><div class="scroll-text">You are</div></section>
        <section class="scroll-section" style="background-image: url('image5.jpg.HEIC');"><div class="scroll-text">my peace.</div></section>
        <section class="scroll-section" style="background-image: url('image6.jpg.HEIC');">
            <div class="scroll-text">Always.</div>
            <button class="btn-enter" style="width: auto; padding: 12px 30px; margin-top: 25px;" onclick="goToFinal()">Hold my Hand</button>
        </section>
    </div>

    <div id="page3" class="page">
        <button class="back-btn" style="color: var(--deep-purple); border-color: var(--deep-purple);" onclick="goBackToScroll()">← PHOTOS</button>
        <div class="letter-box">
            <h2 style="font-family: var(--royal-font); font-style: italic;">Dear Buji,</h2>
            <p style="line-height: 1.8;">[PASTE YOUR LETTER HERE]</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');
        const p3 = document.getElementById('page3');

        function init() { setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 2000); }
        function unmuteVideo() { video.muted = false; }
        function checkLogin() {
            const val = document.getElementById('birthInput').value;
            if (val === "2004-02-23") { // 🚨 EDIT YOUR DATE
                video.pause();
                p1.style.display = 'none'; p2.style.display = 'block';
                document.body.style.overflow = 'auto';
            } else { document.getElementById('error-msg').style.display = 'block'; }
        }
        function goBackToLogin() { p2.style.display = 'none'; p1.style.display = 'flex'; video.play(); }
        function goToFinal() { p2.style.display = 'none'; p3.style.display = 'flex'; window.scrollTo(0,0); }
        function goBackToScroll() { p3.style.display = 'none'; p2.style.display = 'block'; }
    </script>
</body>
</html>
