<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Buji ma 🎀</title>
    <style>
        :root {
            --lavender: #E6E6FA;
            --deep-purple: #4b0082;
            --royal-font: "Didot", serif;
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            color: var(--lavender); font-family: var(--royal-font); font-style: italic;
        }

        /* PAGE 1: LOGIN */
        .page { display: none; width: 100%; height: 100vh; position: relative; }
        #page1 { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 100px; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .login-container {
            position: relative; z-index: 2; width: 280px; padding: 30px; text-align: center;
            background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 40px; animation: float 3s ease-in-out infinite; 
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        /* 🌌 PAGE 2: NARRATIVE SCROLL (Lavender) */
        #page2 { background: var(--lavender); overflow-y: scroll; scroll-snap-type: y mandatory; }
        #page2::-webkit-scrollbar { display: none; }

        .scroll-section {
            height: 100vh; width: 100%; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; position: relative; padding: 20px;
            transition: opacity 0.4s ease; /* Faster Fade */
        }

        /* TEXT STYLES */
        .cosmos-text { font-size: 2.2rem; font-weight: 800; color: #000; text-align: center; opacity: 0; transform: translateY(20px); transition: 0.6s all ease; }
        .section-active .cosmos-text { opacity: 1; transform: translateY(0); }

        /* TYPING TEXT (Scroll 4) */
        .typing-text { font-family: monospace; font-size: 1.2rem; border-right: 2px solid #000; white-space: nowrap; overflow: hidden; width: 0; color: #000; }
        .section-active .typing-text { animation: typing 3s steps(30, end) forwards, blink .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: black } }

        /* TINY IMAGES (Scroll 3) */
        .tiny-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; opacity: 0; transform: scale(0.5); transition: 0.5s all ease; }
        .section-active .tiny-img { opacity: 1; transform: scale(1); }

        /* FULL TEMPLATE (Scroll 5) */
        .full-card { width: 85%; height: 60vh; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .full-card img { width: 100%; height: 100%; object-fit: cover; }

        /* PAGE 3: LETTER */
        #page3 { background: var(--lavender); flex-direction: column; align-items: center; padding: 80px 25px; overflow-y: auto; }
        .letter-box { background: white; padding: 40px; border-radius: 20px; max-width: 500px; width: 100%; color: var(--deep-purple); }

        .btn-enter { background: #000; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body onload="init()">

    <div id="loading-screen">konjam wait panu d chlm🤌🏻</div>

    <div id="page1" class="page" style="display: flex;" onclick="unmuteVideo()">
        <video id="bg-video" autoplay loop playsinline muted><source src="intro.MP4" type="video/mp4"></video>
        <div class="login-container">
            <h2 style="color:white; font-family: var(--royal-font);">For my Buji🎀</h2>
            <input type="date" id="birthInput">
            <button class="btn-enter" style="background: white; color: black;" onclick="checkLogin()">Enter</button>
        </div>
    </div>

    <div id="page2" class="page">
        <section class="scroll-section"><div class="cosmos-text">Thinking of you...</div></section>
        
        <section class="scroll-section"><div class="cosmos-text" style="letter-spacing: 10px; font-weight: 200;">COSMOS</div></section>
        
        <section class="scroll-section">
            <img src="img1.JPG" class="tiny-img">
            <div class="cosmos-text" style="font-size: 1rem;">Tiny moments, big love.</div>
        </section>
        
        <section class="scroll-section"><div class="typing-text">You are the best thing ever...</div></section>
        
        <section class="scroll-section">
            <div class="full-card"><img src="img2.jpg"></div>
            <div class="cosmos-text" style="font-size: 1.2rem; margin-top: 15px;">My favorite view.</div>
        </section>
        
        <section class="scroll-section"><div class="cosmos-text">Always and forever.</div></section>
        
        <section class="scroll-section">
            <div class="cosmos-text">Finally...</div>
            <button class="btn-enter" onclick="goToFinal()">OPEN LETTER</button>
        </section>
    </div>

    <div id="page3" class="page">
        <div class="letter-box">
            <h2 style="font-family: var(--royal-font); font-style: italic;">Dear Buji,</h2>
            <p style="line-height: 1.8;">[PASTE YOUR LETTER HERE]</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');
        const p3 = document.getElementById('page3');

        function init() { setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 2000); }
        function unmuteVideo() { video.muted = false; }
        
        function checkLogin() {
            if (document.getElementById('birthInput').value === "2004-02-23") { 
                video.pause(); p1.style.display = 'none'; p2.style.display = 'block';
                handleScrollEffects(); // Trigger observer
            }
        }

        function goToFinal() { p2.style.display = 'none'; p3.style.display = 'flex'; window.scrollTo(0,0); }

        /* 🕹️ The Narrative Engine */
        function handleScrollEffects() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('section-active');
                    } else {
                        entry.target.classList.remove('section-active');
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.scroll-section').forEach(section => {
                observer.observe(section);
            });
        }
    </script>
</body>
</html>
