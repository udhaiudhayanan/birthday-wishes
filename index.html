<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Buji ma 🎀</title>
    <style>
        :root {
            --lavender: #E6E6FA;
            --deep-purple: #4b0082;
            --royal-font: "Didot", "Bodoni MT", "Cochin", "Baskerville", serif;
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--lavender); overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        /* 1️⃣ PAGE 1: LOGIN (Restored) */
        .page { display: none; width: 100%; height: 100vh; position: relative; z-index: 10; }
        #page1 { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 100px; background: #000; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .login-capsule { position: relative; z-index: 2; width: 280px; padding: 30px 20px; text-align: center; background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 40px; }
        .royal-title { color: white; font-family: var(--royal-font); font-size: 1.4rem; margin-bottom: 20px; }
        input[type="date"] { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.15); border: none; border-bottom: 2px solid var(--lavender); color: white; font-size: 1.1rem; margin-bottom: 25px; text-align: center; border-radius: 10px; }
        .btn-enter { background: transparent; color: white; border: 1px solid var(--lavender); padding: 12px; font-family: var(--royal-font); text-transform: uppercase; letter-spacing: 4px; width: 100%; cursor: pointer; border-radius: 30px; }

        /* 2️⃣ PAGE 2: COSMOS STACKING (LAG-FREE) */
        #page2 { 
            background-color: var(--lavender); 
            overflow-y: auto; 
            scroll-snap-type: y mandatory;
            height: 100vh;
        }

        .stack-section {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligns card to top for better stacking visual */
            padding-top: 5vh;
            scroll-snap-align: start;
            position: sticky; /* Key for stacking effect */
            top: 0;
        }

        .cosmos-card {
            width: 92%;
            height: 85vh;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            background: white;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
        }

        .cosmos-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* The Faded Bottom Overlay */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 30px;
        }

        .card-text {
            color: white;
            font-family: var(--royal-font);
            font-size: 1.7rem;
            font-weight: 500;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* 3️⃣ PAGE 3: FINAL */
        #page3 { background: var(--lavender); flex-direction: column; align-items: center; padding: 100px 25px; overflow-y: auto; z-index: 100; }
        .letter-box { background: white; padding: 40px; border-radius: 30px; max-width: 500px; width: 100%; color: var(--deep-purple); }

        .nav-btn {
            position: fixed; top: 25px; left: 20px; z-index: 200;
            background: rgba(255, 255, 255, 0.5); padding: 8px 15px; border-radius: 20px; border: none; font-size: 0.7rem;
        }
    </style>
</head>
<body onload="init()">

    <div id="loading-screen" style="position:fixed; inset:0; background:#000; color:white; display:flex; justify-content:center; align-items:center; z-index:1000;">konjam wait panu d chlm🤌🏻</div>

    <div id="page1" class="page" style="display: flex;" onclick="unmuteVideo()">
        <video id="bg-video" autoplay loop playsinline muted><source src="video.mp4.MP4" type="video/mp4"></video>
        <div class="login-capsule">
            <div class="royal-title">For my Buji ma 🎀🤌🏻</div>
            <input type="date" id="birthInput">
            <button class="btn-enter" onclick="checkLogin()">Enter</button>
            <div id="error-msg" style="color:#ffb3b3; display:none; margin-top:10px; font-size:0.8rem;">Wrong date👺</div>
        </div>
    </div>

    <div id="page2" class="page">
        <button class="nav-btn" onclick="goBackToLogin()">RESET</button>
        
        <div class="stack-section">
            <div class="cosmos-card"><img src="image1.jpg.JPG"><div class="card-overlay"><div class="card-text">Every moment with you...</div></div></div>
        </div>
        <div class="stack-section">
            <div class="cosmos-card"><img src="image2.jpg.HEIC"><div class="card-overlay"><div class="card-text">Is a beautiful dream.</div></div></div>
        </div>
        <div class="stack-section">
            <div class="cosmos-card"><img src="image3.jpg.HEIC"><div class="card-overlay"><div class="card-text">Your smile is my light.</div></div></div>
        </div>
        <div class="stack-section">
            <div class="cosmos-card"><img src="image4.jpg.jpg"><div class="card-overlay"><div class="card-text">My world is better with you.</div></div></div>
        </div>
        <div class="stack-section">
            <div class="cosmos-card"><img src="image5.jpg.HEIC"><div class="card-overlay"><div class="card-text">Always and forever.</div></div></div>
        </div>
        <div class="stack-section">
            <div class="cosmos-card">
                <img src="image6.jpg.HEIC">
                <div class="card-overlay">
                    <div class="card-text">I love you, Buji!</div>
                    <button class="btn-enter" onclick="goToFinal()">Read Letter</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="letter-box">
            <h2 style="font-family: var(--royal-font);">Dear Buji,</h2>
            <p>[PASTE YOUR LONG LETTER HERE]</p>
            <button class="btn-enter" style="color:var(--deep-purple); border-color:var(--deep-purple);" onclick="goBackToScroll()">Back to Photos</button>
        </div>
    </div>

    <script>
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');
        const p3 = document.getElementById('page3');
        const video = document.getElementById('bg-video');

        function init() { setTimeout(() => document.getElementById('loading-screen').style.display='none', 1500); }
        function unmuteVideo() { video.muted = false; }

        function checkLogin() {
            if (document.getElementById('birthInput').value === "2004-02-23") { // 🚨 UPDATE DATE
                p1.style.display = 'none'; p2.style.display = 'block';
                document.body.style.overflow = 'auto';
            } else { document.getElementById('error-msg').style.display = 'block'; }
        }

        function goBackToLogin() { p2.style.display = 'none'; p1.style.display = 'flex'; window.scrollTo(0,0); }
        function goToFinal() { p2.style.display = 'none'; p3.style.display = 'flex'; window.scrollTo(0,0); }
        function goBackToScroll() { p3.style.display = 'none'; p2.style.display = 'block'; }
    </script>
</body>
</html>
