<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Buji ma 🎀</title>
    <style>
        :root {
            --peach: #FFDAB9;
            --lavender: #E6E6FA;
            --amethyst: #9966CC; 
            --glass: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.3);
            --royal-font: "Didot", serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--peach); overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        #loading-screen {
            position: fixed; inset: 0; background: var(--peach); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            color: #333; font-family: var(--royal-font); font-style: italic;
        }

        /* 1️⃣ PAGE 1: LOGIN */
        .page { display: none; width: 100%; height: 100vh; position: relative; }
        #page1 { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 12vh; background: var(--peach); }
        #bg-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .login-capsule { 
            position: relative; z-index: 2; width: 280px; padding: 30px; text-align: center; 
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: floatUI 4s ease-in-out infinite;
        }

        @keyframes floatUI { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        input[type="date"] {
            width: 100%; padding: 12px; background: transparent; border: none; 
            border-bottom: 2px solid #333; color: #333; text-align: center;
            font-size: 1.1rem; margin-bottom: 20px; outline: none;
        }

        .btn-enter { background: #333; color: white; border: none; padding: 12px; width: 100%; border-radius: 30px; font-weight: bold; }

        /* 2️⃣ PAGE 2: FULL SCREEN PERSPECTIVE SCROLL */
        #page2 { 
            background-color: var(--lavender); 
            overflow-y: scroll; scroll-snap-type: y mandatory;
            height: 100vh; perspective: 1500px;
        }
        #page2::-webkit-scrollbar { display: none; }

        .stack-container {
            height: 100vh; width: 100%; display: flex; justify-content: center;
            align-items: center; scroll-snap-align: start; 
            position: sticky; top: 0;
        }

        .perspective-wrapper {
            width: 100%; height: 100vh; /* Full Screen */
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column;
            position: relative;
        }

        /* Full Width Top Transparent Header */
        .glass-header {
            position: absolute; top: 0; left: 0; width: 100%;
            min-height: 100px; background: linear-gradient(to bottom, var(--glass), transparent);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 5; display: flex; align-items: center; justify-content: center;
            padding: 20px; border-bottom: 1px solid var(--glass-border);
        }

        .photo-card {
            width: 100%; height: 100%; 
            background: #fff; overflow: hidden;
        }

        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        .black-bold-text { 
            color: #000; font-weight: 900; font-size: 1.8rem; 
            text-align: center; line-height: 1.2; text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3️⃣ PAGE 3: LETTER */
        #page3 { background: var(--amethyst); flex-direction: column; align-items: center; padding: 80px 25px; overflow-y: auto; }
        .letter-box { background: white; padding: 40px; border-radius: 40px; width: 100%; max-width: 500px; color: #333; }

    </style>
</head>
<body onload="init()">

    <div id="loading-screen">konjam wait panu d chlm🤌🏻</div>

    <div id="page1" class="page" style="display: flex;" onclick="unmuteVideo()">
        <video id="bg-video" autoplay loop playsinline muted><source src="intro.MP4" type="video/mp4"></video>
        <div class="login-capsule">
            <div style="color:#333; margin-bottom:15px; font-weight: bold;">For my Buji ma 🎀</div>
            <input type="date" id="birthInput">
            <button class="btn-enter" onclick="checkLogin()">Enter</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="stack-container" style="z-index: 1;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">Thinking of you</div></div><div class="photo-card"><img src="img1.JPG"></div></div></div>
        <div class="stack-container" style="z-index: 2;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">Every moment</div></div><div class="photo-card"><img src="img2.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 3;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">Is magical</div></div><div class="photo-card"><img src="img3.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 4;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">My world</div></div><div class="photo-card"><img src="img4.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 5;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">My peace</div></div><div class="photo-card"><img src="img5.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 6;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">Always</div></div><div class="photo-card"><img src="img6.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 7;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">Forever</div></div><div class="photo-card"><img src="img7.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 8;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">In my heart</div></div><div class="photo-card"><img src="img8.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 9;"><div class="perspective-wrapper"><div class="glass-header"><div class="black-bold-text">Stay close</div></div><div class="photo-card"><img src="img9.jpg"></div></div></div>
        <div class="stack-container" style="z-index: 10;">
            <div class="perspective-wrapper">
                <div class="glass-header"><div class="black-bold-text">I Love You</div></div>
                <div class="photo-card">
                    <img src="img10.jpg">
                    <button onclick="goToFinal()" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background:black; color:white; border:none; padding:15px 40px; border-radius:30px; font-weight:900; z-index: 10;">OPEN LETTER</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="letter-box">
            <h2 style="font-family: var(--royal-font); font-style: italic;">Dear Buji,</h2>
            <p style="line-height: 1.8;">[PASTE YOUR LETTER HERE]</p>
            <button class="btn-enter" style="background:#000; margin-top: 20px;" onclick="location.reload()">Replay</button>
        </div>
    </div>

    <script>
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');
        const wrappers = document.querySelectorAll('.perspective-wrapper');

        function init() { setTimeout(() => document.getElementById('loading-screen').style.display='none', 2000); }
        function unmuteVideo() { document.getElementById('bg-video').muted = false; }

        function checkLogin() {
            if (document.getElementById('birthInput').value === "2004-02-23") { 
                const v = document.getElementById('bg-video'); v.pause(); v.remove();
                p1.style.display = 'none'; p2.style.display = 'block';
            }
        }

        /* 🏎️ Smooth Perspective Slide */
        p2.addEventListener('scroll', () => {
            wrappers.forEach((wrapper) => {
                const rect = wrapper.getBoundingClientRect();
                // When rect.top is 0, card is centered. When negative, it's moving up.
                if (rect.top < 0) {
                    const xShift = Math.abs(rect.top) * 0.4; // Push Right
                    const rotate = Math.abs(rect.top) * 0.05; // Tilt
                    wrapper.style.transform = `translateX(${xShift}px) rotateY(-${rotate}deg)`;
                } else {
                    wrapper.style.transform = `translateX(0px) rotateY(0deg)`;
                }
            });
        });

        function goToFinal() { p2.style.display = 'none'; document.getElementById('page3').style.display = 'flex'; window.scrollTo(0,0); }
    </script>
</body>
</html>
