<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Buji ma 🎀</title>
    <style>
        :root {
            --lavender: #E6E6FA;
            --deep-purple: #4b0082;
            --royal-font: "Didot", serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: -apple-system, sans-serif;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            color: var(--lavender); font-family: var(--royal-font);
        }

        /* FIXED BACK BUTTON: VISIBLE GLASS STYLE */
        .back-nav {
            position: fixed; top: 25px; left: 20px; z-index: 2000;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px);
            color: white; border: 1.5px solid white;
            padding: 12px 18px; border-radius: 50px; cursor: pointer; 
            display: none; font-weight: bold; font-size: 1rem;
        }

        /* PAGE 1: LOGIN */
        .page { display: none; width: 100%; height: 100vh; position: relative; }
        #page1 { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 100px; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .login-container {
            position: relative; z-index: 2; width: 280px; padding: 30px; text-align: center;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
        }

        input[type="date"] {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1); 
            border: 1px solid var(--lavender); border-radius: 15px;
            color: white; font-size: 1rem; margin-bottom: 20px; outline: none; text-align: center;
        }
        input[type="date"]::before { content: "Tap here 👇🏻  "; color: rgba(255,255,255,0.8); }

        #error-msg { color: #ffb3b3; font-size: 0.75rem; margin-top: 10px; display: none; font-weight: bold; }

        /* PAGE 2: LAVENDER SCROLL */
        #page2 { background: var(--lavender); overflow-y: scroll; scroll-snap-type: y mandatory; height: 100vh; }
        #page2::-webkit-scrollbar { display: none; }

        .scroll-section {
            height: 100vh; width: 100%; scroll-snap-align: start;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            position: relative; padding: 20px;
        }

        .fade-item { opacity: 0; transition: all 0.8s ease-out; transform: translateY(20px); }
        .show { opacity: 1 !important; transform: translateY(0) !important; }

        .cosmos-title { font-size: 2.5rem; font-weight: 900; color: #000; letter-spacing: 5px; text-transform: uppercase; text-align: center; }
        .typing-box { font-family: monospace; font-size: 1.1rem; color: #000; border-right: 2px solid #000; white-space: nowrap; overflow: hidden; width: 0; }
        .type-now { animation: typing 3s steps(30, end) forwards; }
        @keyframes typing { from { width: 0 } to { width: 100% } }

        .btn-enter { background: #000; color: white; border: none; padding: 12px 40px; border-radius: 30px; font-weight: bold; margin-top: 20px; }
        .sub-txt { color: #444; font-style: italic; margin-top: 10px; text-align: center; font-size: 0.95rem; }
    </style>
</head>
<body onload="init()">

    <div id="loading-screen">konjam wait panu d chlm🤌🏻</div>
    <button class="back-nav" id="universalBack" onclick="goBack()">← BACK</button>

    <div id="page1" class="page" style="display: flex;" onclick="unmuteVideo()">
        <video id="bg-video" autoplay loop playsinline muted><source src="intro.MP4" type="video/mp4"></video>
        <div class="login-container">
            <h2 style="color:white; font-family: var(--royal-font);">For my Buji🎀</h2>
            <input type="date" id="birthInput">
            <button class="btn-enter" style="background: white; color: black; width: 100%;" onclick="checkLogin()">Enter</button>
            <div id="error-msg">Birthdate ah correct podu eruma maadu👺</div>
        </div>
    </div>

    <div id="page2" class="page">
        
        <section class="scroll-section">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%;">
                <div class="fade-item"><img src="img1.JPG" style="width:100%; border-radius:10px;"></div>
                <div class="fade-item" style="margin-top:30px;"><img src="img2.jpg" style="width:100%; border-radius:10px;"></div>
            </div>
            <p class="sub-txt fade-item">Scroll Down to start ↓</p>
        </section>

        <section class="scroll-section">
            <div class="cosmos-title fade-item">COSMOS</div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <img src="img3.jpg" class="fade-item" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
                <img src="img4.jpg" class="fade-item" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
            </div>
        </section>

        <section class="scroll-section">
            <img src="img5.jpg" style="width: 150px; border-radius: 15px;" class="fade-item">
            <p class="sub-txt fade-item">Tiny moments with you.</p>
        </section>

        <section class="scroll-section">
            <div class="typing-box" id="typer">You are my peace...</div>
            <img src="img6.jpg" class="fade-item" style="width: 60px; margin-top: 20px; border-radius: 50%;">
        </section>

        <section class="scroll-section">
            <div style="width: 80%; height: 45vh; background: #fff; border-radius: 20px; overflow: hidden;" class="fade-item">
                <img src="img7.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <p class="sub-txt fade-item">My favorite view.</p>
        </section>

        <section class="scroll-section">
            <div style="display: flex; gap: 15px;">
                <img src="img8.jpg" class="fade-item" style="width: 100px; border-radius: 10px;">
                <img src="img9.jpg" class="fade-item" style="width: 100px; border-radius: 10px; margin-top: 40px;">
            </div>
            <p class="sub-txt fade-item">Always & Forever.</p>
        </section>

        <section class="scroll-section">
            <div class="fade-item" style="text-align: center;">
                <img src="img10.jpg" style="width: 250px; border-radius: 20px; margin-bottom: 20px;">
                <button class="btn-enter" onclick="goToFinal()">READ THE LETTER</button>
            </div>
        </section>
    </div>

    <div id="page3" class="page" style="background: var(--lavender); overflow-y: auto;">
        <div style="display: flex; flex-direction: column; align-items: center; padding: 100px 20px;">
            <div style="background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 500px;">
                <h2 style="font-family: var(--royal-font);">Dear Buji,</h2>
                <p style="line-height: 1.8;">[PASTE YOUR LETTER HERE]</p>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const p1 = document.getElementById('page1');
        const p2 = document.getElementById('page2');
        const p3 = document.getElementById('page3');
        const backBtn = document.getElementById('universalBack');

        function init() { setTimeout(() => document.getElementById('loading-screen').style.display='none', 2000); }
        function unmuteVideo() { video.muted = false; }
        
        function checkLogin() {
            if (document.getElementById('birthInput').value === "2004-02-23") { 
                video.pause();
                p1.style.display = 'none'; p2.style.display = 'block';
                backBtn.style.display = 'block';
                setupObserver();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function goBack() {
            if (p3.style.display === 'block') { p3.style.display = 'none'; p2.style.display = 'block'; }
            else { p2.style.display = 'none'; p1.style.display = 'flex'; backBtn.style.display = 'none'; video.play(); }
        }

        function goToFinal() { p2.style.display = 'none'; p3.style.display = 'block'; window.scrollTo(0,0); }

        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('show');
                        if (entry.target.id === 'typer') entry.target.classList.add('type-now');
                    }
                });
            }, { threshold: 0.3 });
            document.querySelectorAll('.fade-item, .typing-box, .sub-txt').forEach(el => observer.observe(el));
        }
    </script>
</body>
</html>
